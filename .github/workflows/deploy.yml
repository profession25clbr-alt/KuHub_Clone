name: KUHUB Deploy

on:
  push:
    tags:
      - 'K*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 🔍 PASO DE DIAGNÓSTICO: Si este paso falla, el problema es la web de GitHub
      - name: Verify Secret Presence
        run: |
          if [ -z "${{ secrets.KUHUB_MASTER_KEY }}" ]; then
            echo "❌ ERROR: GitHub no encuentra el secret KUHUB_MASTER_KEY"
            exit 1
          else
            echo "✅ Secret detectado correctamente."
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kuhub-app:backend-${{ steps.vars.outputs.tag }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kuhub-app:frontend-${{ steps.vars.outputs.tag }}
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_REMOTE_HOST }}
          username: ${{ secrets.AWS_REMOTE_USER }}
          key: ${{ secrets.KUHUB_MASTER_KEY }}
          port: 22
          script: |
            cd ~/kuhub-app
            # Sincronizamos la versión del tag con el entorno del servidor
            sed -i "s/^TAG=.*/TAG=${{ steps.vars.outputs.tag }}/" .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af