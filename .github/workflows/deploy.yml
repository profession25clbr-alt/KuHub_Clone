name: KUHUB Deploy

on:
  push:
    tags:
      - 'K*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_AWS_AC_USERNAME }}
          password: ${{ secrets.DOCKER_AWS_AC_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_AWS_AC_USERNAME }}/kuhub-app:backend-${{ steps.vars.outputs.tag }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_AWS_AC_USERNAME }}/kuhub-app:frontend-${{ steps.vars.outputs.tag }}

      - name: Deploy to AWS Lightsail
        run: |
          echo "${{ secrets.KUHUB_MASTER_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

          # Copiar docker-compose.yml actualizado al servidor
          scp -i key.pem -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.AWS_REMOTE_USER }}@${{ secrets.AWS_REMOTE_HOST }}:~/kuhub-app/docker-compose.yml

          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.AWS_REMOTE_USER }}@${{ secrets.AWS_REMOTE_HOST }} << 'EOF'
            cd ~/kuhub-app
          
            # Detener contenedores actuales
            docker compose down
          
            # Eliminar TODAS las imágenes antiguas de kuhub-app
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "kuhub-app" | xargs -r docker rmi -f 2>/dev/null || true
          
            # Limpiar imágenes huérfanas
            docker image prune -af
          
            # Actualizar TAG en .env
            sed -i "s/^TAG=.*/TAG=${{ steps.vars.outputs.tag }}/" .env
          
            # Descargar nuevas imágenes
            docker compose pull
          
            # Iniciar con las nuevas imágenes
            docker compose up -d
          
            # Verificar que están corriendo
            docker ps
          
            echo "✅ Deploy completado - KUHUB ${{ steps.vars.outputs.tag }}"
          EOF
          rm key.pem