# ======================================================================
# DATASOURCE CONFIGURATION (Con Variables de Entorno)
# ======================================================================
# Si existe SPRING_DATASOURCE_URL (en AWS), la usa. Si no, usa localhost (para tu PC)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Kuhub_mat_local}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234567}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================================
# JPA/HIBERNATE CONFIGURATION
# ======================================================================
# ddl-auto=update permite que Hibernate cree las tablas iniciales en la DB de AWS
# C·mbialo a 'validate' si ya tienes el esquema listo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar consultas SQL (⁄til para debugear, aunque en producciÛn suele ponerse en false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar inicializaciÛn autom·tica
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ======================================================================
# SERVER CONFIGURATION
# ======================================================================
server.port=8080

# ======================================================================
# COMPRESI”N GZIP (°Para que vuele!)
# ======================================================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

# ======================================================================
# LOGGING CONFIGURATION
# ======================================================================
logging.level.com.kuhub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ======================================================================
# SWAGGER / OPENAPI
# ======================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html