# ======================================================================
# DATASOURCE CONFIGURATION (Con Variables de Entorno)
# ======================================================================
# Si existe SPRING_DATASOURCE_URL (en AWS), la usa. Si no, usa localhost (para tu PC)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Kuhub_mat_local}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234567}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================================
# JPA/HIBERNATE CONFIGURATION
# ======================================================================
# ddl-auto=none — esquema ya existe en BD, Hibernate no toca la estructura
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar consultas SQL (�til para debugear, aunque en producci�n suele ponerse en false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar inicializaci�n autom�tica
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ======================================================================
# SERVER CONFIGURATION
# ======================================================================
server.port=8080

# ======================================================================
# LOGGING CONFIGURATION
# ======================================================================
logging.level.root=INFO
logging.level.com.kuhub=DEBUG
logging.level.KuHub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ======================================================================
# SWAGGER / OPENAPI
# ======================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html