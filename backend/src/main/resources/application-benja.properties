# ===== DATASOURCE CONFIGURATION =====
# Configuración de conexión PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/kuhubdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
#! CONECTE A LA BASE DE DATOS CON !
# enlace: kuhub.cwl216pndypy.us-east-1.rds.amazonaws.com  | puerto 5432  | clave KubHub_2025 | nombre de la base de datos kuhub_db
# ===== JPA/HIBERNATE CONFIGURATION =====
# No modificar el esquema - las tablas ya existen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar consultas SQL (útil para desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar inicialización automática
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ===== SERVER CONFIGURATION =====
# Puerto de la aplicación
server.port=8080

# ===== LOGGING CONFIGURATION =====
# Nivel de logs para debugging
logging.level.com.kuhub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Swagger

#http://localhost:8080/swagger-ui/index.html#/

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html