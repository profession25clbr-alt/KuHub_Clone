server {
    listen 80;

    # ── Configuración de Compresión Gzip ──────────────────
        gzip on;
        gzip_vary on;
        gzip_proxied any;          # ¡Vital! Comprime lo que viene del proxy (backend)
        gzip_comp_level 5;         # Nivel de compresión (1-9). 5 es el punto óptimo.
        gzip_min_length 2048;      # server.compression.min-response-size=2048

        # server.compression.mime-types=...
        gzip_types
            text/plain
            text/css
            application/json
            application/javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript;
        # ──────────────────────────────────────────────────────

    # Proxy de API al backend (red interna Docker)
    # resolver 127.0.0.11 = DNS interno de Docker; set $backend evita que Nginx
    # falle al arrancar si el contenedor backend aún no está listo.
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8080;

    location /api/ {
        proxy_pass         $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Frontend React (SPA)
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
