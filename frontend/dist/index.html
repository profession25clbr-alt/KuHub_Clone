    <title>KuHub - App</title>
    <!--
      Script sincrónico de inicialización de tema.
      DEBE estar aquí (inline, sin defer/async) para ejecutarse ANTES de que
      el navegador pinte el primer frame y ANTES de que cualquier módulo JS cargue.
      Esto evita el flash de tema oscuro (FOUC) cuando el OS está en dark mode
      pero la app debe mostrar light por defecto.

      Lógica:
        - Si el usuario guardó preferencia → respetarla
        - Si no hay preferencia → forzar light (ignorar prefers-color-scheme del OS)
    -->
    <script>
      (function () {
        function applyTheme(t) {
          if (t === 'dark') {
            document.documentElement.classList.remove('light');
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          }
        }

        // Leer preferencia guardada; si no hay ninguna → default LIGHT
        var saved = localStorage.getItem('heroui-theme') || localStorage.getItem('theme');
        if (!saved) {
          localStorage.setItem('heroui-theme', 'light');
          saved = 'light';
        }
        applyTheme(saved);

        // Guardian: vigila cambios en las clases del <html> y los corrige
        // si no coinciden con la preferencia guardada en localStorage.
        // Esto neutraliza scripts externos (ej. heroui-chat-script) que puedan
        // sobreescribir el tema sin pasar por localStorage.
        // Nota: HeroUI actualiza localStorage ANTES de tocar el DOM, por lo que
        // los cambios legítimos del usuario siempre serán respetados.
        var guarding = false;
        new MutationObserver(function () {
          if (guarding) return;
          var desired = localStorage.getItem('heroui-theme') || 'light';
          var hasDark  = document.documentElement.classList.contains('dark');
          var hasLight = document.documentElement.classList.contains('light');
          if ((desired === 'dark') !== hasDark || (!hasDark && !hasLight)) {
            guarding = true;
            applyTheme(desired);
            guarding = false;
          }
        }).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
      })();
    </script>
