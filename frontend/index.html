<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/components/assets/QuestWeb_IsoLogo_W_BG.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KuHub - App</title>
    <!--
      Script sincrónico de inicialización de tema.
      DEBE estar aquí (inline, sin defer/async) para ejecutarse ANTES de que
      el navegador pinte el primer frame y ANTES de que cualquier módulo JS cargue.
      Esto evita el flash de tema oscuro (FOUC) cuando el OS está en dark mode
      pero la app debe mostrar light por defecto.

      Lógica:
        - Si el usuario guardó preferencia → respetarla
        - Si no hay preferencia → forzar light (ignorar prefers-color-scheme del OS)
    -->
    <script>
      (function () {
        var saved = localStorage.getItem('heroui-theme') || localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          // Sin preferencia guardada → default LIGHT, sin importar el tema del OS
          document.documentElement.classList.remove('dark');
          if (!saved) {
            localStorage.setItem('heroui-theme', 'light');
          }
        }
      })();
    </script>
  </head>
  <body class="h-full min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Scripts externos movidos al final y con defer para no bloquear el renderizado -->
    <script defer src="https://cdn.jsdelivr.net/npm/heroui-chat-script@0/dist/index.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/heroui-chat-script@beta/dist/select-and-edit-utils.global.js"></script>
  </body>
</html>
